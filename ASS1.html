<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Portal</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(120deg, #2193b0 0%, #6dd5ed 100%);
      margin: 0;
      padding: 0;
      color: #311111;
    }

    h1 {
      text-align: center;
      padding: 20px;
      color: #fff;
      font-size: 2.2rem;
      font-weight: bold;
    }


    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-around;
      margin: 20px;
    }

    .card {
      background: #fff;
      flex: 1 1 40%;
      margin: 15px;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 6px 15px rgba(0, 0, 0, 0.2);
    }

    .card h2 {
      margin-bottom: 15px;
      color: #2193b0;
      text-align: center;
      font-size: 1.4rem;
    }


    form label {
      display: block;
      margin: 8px 0 4px;
      font-weight: bold;
      font-size: 0.9rem;
    }

    form input[type="text"],
    form input[type="email"],
    form input[type="password"] {
      width: 100%;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 0.9rem;
      transition: 0.3s;
    }

    form input[type="text"]:focus,
    form input[type="email"]:focus,
    form input[type="password"]:focus {
      border-color: #2193b0;
      outline: none;
      box-shadow: 0 0 6px rgba(33, 147, 176, 0.4);
    }

    form input[type="checkbox"],
    form input[type="radio"] {
      margin-right: 6px;
    }

    #submidButton {
      display: inline-block;
      padding: 8px 16px;
      margin-top: 15px;
      background: linear-gradient(135deg, #2193b0, #6dd5ed);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: 0.3s;
    }

    #submidButton:hover {
      background: linear-gradient(135deg, #197a91, #5ccbe0);
      transform: scale(1.05);
    }


    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 6px 15px rgba(0, 0, 0, 0.2);
    }

    caption {
      font-size: 18px;
      font-weight: bold;
      margin: 10px;
      color: #2193b0;
    }

    th,
    td {
      padding: 10px;
      text-align: center;
      border-bottom: 1px solid #ddd;
      font-size: 0.9rem;
    }

    th {
      background: #2193b0;
      color: #fff;
    }

    tr:nth-child(even) {
      background: #f9f9f9;
    }

    tr:hover {
      background: #e0f7fa;
      transition: 0.3s;
    }


    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }

      .card {
        flex: 1 1 100%;
      }

      h1 {
        font-size: 1.8rem;
      }

      th,
      td {
        font-size: 0.8rem;
        padding: 8px;
      }
    }
  </style>
</head>

<body>
  <h1>Welcome to Student Portal</h1>

  <div class="container">

    <div class="card">
      <h2>Register Student</h2>
      <form id="schoolForm">
        <label><b>Name</b></label>
        <input id="fullname" type="text" name="fullname" placeholder="Enter full name" />

        <label><b>School</b></label>
        <input id="school" type="text" name="School" placeholder="Enter school name" />

        <label><b>Level</b></label>
        <input id="level" type="text" name="level" placeholder="Enter level (e.g., 300L)" />

        <label><b>Email</b></label>
        <input id="email" type="email" name="email" placeholder="Enter email address" />

        <label><b>Password</b></label>
        <input id="password" type="password" name="password" placeholder="Enter password" />

        <label><input id="terms" type="checkbox" name="terms" /> <b>Accept T&C</b></label>

        <label><input id="cashPayment" type="radio" name="paymentMethod" value="Cash" /> <b>Cash</b></label>
        <label><input id="cardPayment" type="radio" name="paymentMethod" value="Card" /> <b>Card</b></label>

        <input id="submidButton" type="button" value="Insert" />
      </form>

    </div>

    <!-- Student Records -->
    <div class="card">
      <h2>Student Records</h2>
      <table id="schoolTable">
        <caption>List of CSC300L Students</caption>
        <tr>
          <th>Id</th>
          <th>Name</th>
          <th>School</th>
          <th>Level</th>
          <th>Email</th>
          <th>Password</th>
          <th>Terms</th>
          <th>Payment Method</th>
        </tr>
      </table>
    </div>
  </div>

  <script>
    let id = 1;
    let submitButton = document.getElementById("submidButton");

    function insertData() {
      const schoolForm = document.getElementById("schoolForm");

      const fullname = schoolForm.elements.fullname;
      const school = schoolForm.elements.school;
      const level = schoolForm.elements.level;
      const email = schoolForm.elements.email;
      const password = schoolForm.elements.password;
      const terms = schoolForm.elements.terms;
      const paymentMethod = schoolForm.elements.paymentMethod;

      // ✅ Validation rules
      if (!fullname.value.trim().includes(" ")) {
        alert("Please enter your full name (first and last).");
        return;
      }

      if (!level.value.trim().startsWith("N0")) {
        alert("Level must start with 'N0'. Example: N01, N02.");
        return;
      }

      if (!email.value.includes("@")) {
        alert("Please enter a valid email address containing '@'.");
        return;
      }

      // Insert into table if validation passes
      let row = schoolTable.insertRow();
      let cell1 = row.insertCell(0);
      let cell2 = row.insertCell(1);
      let cell3 = row.insertCell(2);
      let cell4 = row.insertCell(3);
      let cell5 = row.insertCell(4);
      let cell6 = row.insertCell(5);
      let cell7 = row.insertCell(6);
      let cell8 = row.insertCell(7);

      cell1.innerHTML = id;
      cell2.innerHTML = fullname.value;
      cell3.innerHTML = school.value;
      cell4.innerHTML = level.value;
      cell5.innerHTML = email.value;

      // 🔒 Mask password with asterisks
      cell6.innerHTML = "*".repeat(password.value.length);

      cell7.innerHTML = terms.checked ? "Yes" : "No";
      cell8.innerHTML = paymentMethod.value;

      id++;

      // Reset form fields
      fullname.value = "";
      school.value = "";
      level.value = "";
      email.value = "";
      password.value = "";
      terms.checked = false;
      paymentMethod.checked = false;
    }

    submitButton.addEventListener("click", insertData);
  </script>


</body>

</html>
